name: Build Nekogram APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Write keystore
        run: |
          mkdir -p TMessagesProj/config
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > TMessagesProj/config/release.jks

      - name: Generate local.properties
        run: |
          cat > TMessagesProj/local.properties << EOF
          sdk.dir=/usr/local/lib/android/sdk
          RELEASE_STORE_FILE=release.jks
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean build
        run: ./gradlew clean

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-Release
          path: "TMessagesProj/build/outputs/apk/release/*.apk"
          retention-days: 30
