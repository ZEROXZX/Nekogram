name: Build Nekogram APK
on:
  # 触发条件：手动触发 + push到main分支
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Nekogram有子模块，必须递归拉取

      # 2. 设置JDK 17（Nekogram要求）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 写入keystore文件到TMessagesProj/config（Nekogram指定路径）
      - name: Write keystore
        run: |
          mkdir -p TMessagesProj/config
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > TMessagesProj/config/release.keystore

      # 4. 生成local.properties（配置签名参数）
      - name: Generate local.properties
        run: |
          cat > TMessagesProj/local.properties << EOF
          sdk.dir=/usr/local/lib/android/sdk
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # 5. 给gradlew执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. 构建Release APK（Nekogram主模块是TMessagesProj，用assembleAfatRelease）
      - name: Build Release APK
        run: ./gradlew TMessagesProj:assembleAfatRelease --no-daemon --stacktrace

      # 7. 上传APK到Actions Artifacts（可下载）
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-Release-APK
          path: TMessagesProj/build/outputs/apk/afat/release/*.apk
          retention-days: 30
