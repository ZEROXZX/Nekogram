name: Build Nekogram Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create keystore
        run: |
          mkdir -p TMessagesProj/config
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > TMessagesProj/config/release.jks

      - name: Config signature
        run: |
          cat > TMessagesProj/local.properties << EOF
          sdk.dir=/usr/local/lib/android/sdk
          RELEASE_STORE_FILE=release.jks
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Permissions
        run: chmod +x gradlew

      # 🔥🔥🔥 Telegram 专用！只编译 arm64 架构！绝对不卡死！
      - name: Build APK
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx6g" \
            -Parm64=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-FINAL-APK
          path: "TMessagesProj/build/outputs/apk/release/*.apk"
